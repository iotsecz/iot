<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Blog | IotSec</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --text: #f5f5f5;
        --text-muted: #94a3b8;
        --accent: #22d3ee;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
      }

      .bg-layer {
        position: fixed;
        inset: 0;
        background: var(--bg) url("assets/background.png") no-repeat center center;
        background-size: cover;
        z-index: -2;
      }
      .bg-layer::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(10,10,15,0.7) 0%, rgba(10,10,15,0.5) 100%);
        z-index: -1;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem 2rem;
        max-width: 1200px;
        margin: 0 auto;
        border-bottom: 1px solid var(--border);
      }
      .nav-logo {
        font-weight: 700;
        font-size: 1.25rem;
        letter-spacing: 0.05em;
        color: var(--text);
        text-decoration: none;
      }
      .nav-links {
        display: flex;
        gap: 2rem;
      }
      .nav-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--accent);
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 4rem 2rem;
        text-align: center;
      }
      .page h1 {
        font-size: clamp(2rem, 4vw, 2.5rem);
        font-weight: 700;
        margin-bottom: 1rem;
      }
      .page p {
        font-size: 1.1rem;
        color: var(--text-muted);
      }

      .footer-bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        border-top: 1px solid var(--border);
      }
      body {
        position: relative;
        min-height: 100vh;
        padding-bottom: 80px;
      }
      .footer-bottom .logo {
        font-weight: 700;
        color: var(--text);
        text-decoration: none;
      }
      .footer-links {
        display: flex;
        gap: 1.5rem;
      }
      .footer-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .footer-links a:hover {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="bg-layer"></div>

    <nav class="nav">
      <a href="index.html" class="nav-logo">IotSec</a>
      <div class="nav-links">
        <a href="blog.html" class="active">Blog</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </nav>

    <main class="page">
      <h1>Blog</h1>
      <p>no writups now</p>
    </main>

    <div class="footer-bottom">
      <a href="index.html" class="logo">IotSec</a>
      <div class="footer-links">
        <a href="blog.html">Blog</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </div>
  </body>
</html>
